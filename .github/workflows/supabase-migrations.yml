name: Supabase Migrations (Manual)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment (e.g., staging/production)"
        required: true
        default: staging

jobs:
  apply:
    name: Apply migrations
    runs-on: ubuntu-latest
    # Tip: protect this environment in GitHub settings to require manual approval
    environment: ${{ github.event.inputs.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ] || [ -z "${SUPABASE_PROJECT_ID}" ]; then
            echo "Required secrets SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_ID are missing." >&2
            exit 1
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push

